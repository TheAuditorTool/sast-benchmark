metadata:
  version: "0.2"
  language: rust
  created: "2026-03-19"
  methodology: |
    Test cases identified by manual code review of 8 Rust applications.
    Each test case is a function annotated with vuln-code-snippet start/end markers.
    Line ranges are DERIVED from source annotations at scoring time (not hardcoded).
    Categories map to CWEs following OWASP Benchmark conventions.
    Ground truth is INDEPENDENT of TheAuditor engine output.
  bias_notes: |
    WARNING: This benchmark was created by the same team that builds TheAuditor.
    To mitigate bias: (1) classifications based on code semantics, not engine behavior,
    (2) real CVE patterns used for inspiration, (3) all decisions documented in CHANGELOG.md.
  tn_gaps: |
    Categories with insufficient TN (safe) test cases: cmdi, ssrf, xss, crypto,
    weakrand, redos, infodisclosure. FPR cannot be measured for these until
    safe variants are added.

# Line ranges are NOT in this file — they come from vuln-code-snippet annotations
# in the source files. The scoring script parses both this YAML and the source.
# This file is the ANSWER KEY: key + category + cwe + vulnerable (true/false).

