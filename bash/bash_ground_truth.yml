# bash_ground_truth.yml
# Answer Key for Bash SAST Benchmark
# Version: 0.3.1 | Created: 2026-03-19 | Updated: 2026-03-22
#
# Philosophy: This answer key was written BEFORE adversarial code, to prevent
# unconscious bias toward what the engine already detects.
#
# Scoring: TPR - FPR (Youden's J). 0% = random guessing. +100% = perfect.
#
# Each test case maps to exactly one vuln-code-snippet annotation in source.
# "vulnerable: true" = TP if detected, FN if missed
# "vulnerable: false" = TN if not detected, FP if incorrectly flagged
#
# EXPECTED OUTCOMES (verified against engine capabilities 2026-03-19):
#   [EXPECTED_FN] = Engine has NO rule for this pattern. Will be FN until fixed.
#                   These are the benchmark's primary VALUE — engine improvement targets.
#   [EXPECTED_FP] = Engine flags this but ground truth says safe. Tests discrimination.
#   (no tag)      = Engine SHOULD detect this. If FN, it's a regression or bug.

